<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mural Digital - CMR Brasil</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body onclick="ativarFullScreen()">

  <!-- O IFRAME CARREGA O SEU GOOGLE APPS SCRIPT ORIGINAL COM TODAS AS SEGURANÇAS E ANIMAÇÕES -->
  <iframe src="SUA_URL_DO_WEB_APP_AQUI" allowfullscreen></iframe>

  <script>
    function ativarFullScreen() {
      let elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mural Digital - CMR Brasil</title>
  <style>
    body { margin: 0; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: white; cursor: pointer; }
    
    #tela-login-tv {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0b2219; z-index: 999999; display: flex;
      align-items: center; justify-content: center; cursor: default;
    }
    .login-card-tv {
      background: white; padding: 40px; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 380px;
      border-top: 8px solid #1b5e20; text-align: center; box-sizing: border-box; color: #333;
    }
    .login-card-tv h2 { color: #1b5e20; margin-top: 0; font-size: 1.5rem; margin-bottom: 10px; }
    .login-card-tv p { font-size: 0.9rem; color: #555; margin-bottom: 20px; }
    .login-card-tv input {
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
      box-sizing: border-box; font-size: 1rem; margin-bottom: 15px; text-align: center; outline: none;
    }
    .login-card-tv button {
      width: 100%; padding: 14px; background: #1b5e20; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .login-card-tv button:hover { background: #004d29; }
    #msg-erro-tv { color: #d32f2f; font-size: 0.85rem; margin-top: 12px; display: none; font-weight: bold; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: girarSpinner 0.8s linear infinite;
      display: none;
    }
    @keyframes girarSpinner {
      to { transform: rotate(360deg); }
    }

    #conteudo-mural-original { display: none; width: 100%; height: 100%; }

    .container { display: flex; height: calc(100vh - 60px); width: 100vw; }
    .mural { flex: 75; background: #000; display: flex; align-items: center; justify-content: center; border-right: 10px solid #ffd600; border-top: 10px solid #ffd600; overflow: hidden; position: relative; }
    .slide-img { width: 100%; height: 100%; object-fit: cover; animation: deslizarEntrada 0.7s ease-out forwards; opacity: 0; }
    .texto-aviso { font-size: 60px; padding: 45px; text-align: center; font-weight: 900; text-transform: uppercase; animation: deslizarEntrada 0.7s ease-out forwards; opacity: 0; }
    @keyframes deslizarEntrada { 0% { transform: translateX(50px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

    .lateral { flex: 25; background: linear-gradient(180deg, #1b5e20 0%, #00264d 100%); display: flex; flex-direction: column; align-items: center; padding: 20px 10px; text-align: center; border-top: 10px solid #ffd600; box-sizing: border-box; }
    .logo-3d { width: 250px; height: 250px; background: white; border-radius: 50%; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: aproximarRecuar 6s infinite ease-in-out; flex-shrink: 0; box-shadow: 0 15px 40px rgba(0,0,0,0.6); perspective: 1000px; }
    .logo-animada { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: giraPara 6s infinite ease-in-out; }
    .logo-animada img { max-width: 85%; max-height: 70%; object-fit: contain; }
    .texto-logo { color: #1b5e20; font-size: 18px; font-weight: bold; text-transform: uppercase; margin-top: 5px; letter-spacing: 3px; }
    @keyframes giraPara { 0% { transform: rotateY(0deg); } 15% { transform: rotateY(360deg); } 100% { transform: rotateY(360deg); } }
    @keyframes aproximarRecuar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .box-info { margin-top: 15px; background: rgba(0, 0, 0, 0.4); border: 2px solid #ffd600; border-radius: 20px; padding: 15px 10px; width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #relogio { font-size: 55px; font-weight: 900; color: #ffd600; line-height: 1; margin-bottom: 5px; font-variant-numeric: tabular-nums; }
    #data-extenso { font-size: 15px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; border-bottom: 1px solid rgba(255,214,0,0.3); padding-bottom: 10px; }
    
    #frase-dia { font-size: 18px; font-style: italic; color: #fff; line-height: 1.4; padding: 5px; font-weight: 500; }
    .titulo-frase { font-size: 11px; color: #ffd600; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; display: block; }

    .letreiro-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 4px solid #ffd600; overflow: hidden; display: flex; align-items: center; z-index: 999; }
    .letreiro-texto { white-space: nowrap; font-size: 28px; font-weight: bold; color: #ffd600; animation: correrTexto 35s linear infinite; padding-left: 100%; }
    @keyframes correrTexto { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  </style>
</head>
<body onclick="ativarFullScreen()">

<div id="tela-login-tv" onclick="event.stopPropagation()">
  <div class="login-card-tv">
    <h2>Mural Digital</h2>
    <p>Digite seu e-mail autorizado para abrir o painel na TV:</p>
    <input type="email" id="email" placeholder="seu_email@empresa.com" autofocus>
    <button id="btn-acessar" onclick="tentarLoginTv()">
      <span id="texto-botao">Acessar Mural</span>
      <div id="spinner-login" class="spinner"></div>
    </button>
    <div id="msg-erro-tv">❌ E-mail não cadastrado!</div>
  </div>
</div>

<div id="conteudo-mural-original">
  <div class="container">
    <div class="mural" id="mural"><div class="texto-aviso">SINCRONIZANDO...</div></div>
    <div class="lateral">
      <div id="logo-box" class="logo-3d"></div>
      <div class="box-info">
        <div id="relogio">00:00:00</div>
        <span id="data-extenso">---</span>
        <div>
          <span class="titulo-frase">Frase do Dia</span>
          <div id="frase-dia">A carregar inspiração...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="letreiro-container">
    <div class="letreiro-texto" id="letreiro">Aguardando dados...</div>
  </div>
</div>

<script>
  const URL_API = 'https://script.google.com/macros/s/AKfycby63K4tCBzXO2jzpP4IY6ofJ3HiOdO63aDU-E_i-CG_Y2TFSXe7qG1blkNcgdRU75ukWw/exec';

  let conteudos = [];
  let currentIndex = 0;
  let carrosselAtivo = false;

  function tentarLoginTv() {
    const inputField = document.getElementById('email');
    const email = inputField ? inputField.value.trim() : '';
    const msgErro = document.getElementById('msg-erro-tv');
    const spinner = document.getElementById('spinner-login');
    const textoBotao = document.getElementById('texto-botao');
    const btnAcessar = document.getElementById('btn-acessar');
    
    if (!email) {
      msgErro.innerText = "❌ Digite um e-mail válido!";
      msgErro.style.display = "block";
      return;
    }

    msgErro.style.display = 'none';
    spinner.style.display = 'block';
    textoBotao.innerText = 'Validando...';
    btnAcessar.disabled = true;

    fetch(`${URL_API}?acao=validar&email=${encodeURIComponent(email)}`)
      .then(response => response.json())
      .then(data => {
        if (data.autorizado) {
          document.getElementById('tela-login-tv').style.display = 'none';
          document.getElementById('conteudo-mural-original').style.display = 'block';
          iniciarSistemaOriginal();
        } else {
          spinner.style.display = 'none';
          textoBotao.innerText = 'Acessar Mural';
          btnAcessar.disabled = false;
          msgErro.innerText = "❌ E-mail não cadastrado!";
          msgErro.style.display = "block";
        }
      })
      .catch(erro => {
        spinner.style.display = 'none';
        textoBotao.innerText = 'Acessar Mural';
        btnAcessar.disabled = false;
        msgErro.innerText = "❌ Erro na conexão com o servidor!";
        msgRes.style.display = "block";
      });
  }

  const campoEmail = document.getElementById('email');
  if (campoEmail) {
    campoEmail.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        tentarLoginTv();
      }
    });
  }

  function ativarFullScreen() {
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
      elem.msRequestFullscreen();
    }
  }

  function atualizarRelogio() {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' }).toUpperCase();
  }
  setInterval(atualizarRelogio, 1000);

  function carregarDados() {
    fetch(`${URL_API}?acao=dadosTV`)
      .then(res => res.json())
      .then(res => {
        if(res && res.length > 0) {
          conteudos = res;
          if(!carrosselAtivo) { carrosselAtivo = true; exibir(); }
        }
      }).catch(e => console.log("Erro dadosTV"));
    
    fetch(`${URL_API}?acao=letreiro`)
      .then(res => res.json())
      .then(texto => {
        if(texto) document.getElementById('letreiro').innerText = texto + " • ";
      }).catch(e => console.log("Erro letreiro"));

    fetch(`${URL_API}?acao=frase`)
      .then(res => res.json())
      .then(frase => {
        if(frase) document.getElementById('frase-dia').innerText = frase;
      }).catch(e => console.log("Erro frase"));
    
    fetch(`${URL_API}?acao=logo`)
      .then(res => res.json())
      .then(url => {
        if(url) document.getElementById('logo-box').innerHTML = `<div class="logo-animada"><img src="${url}"><div class="texto-logo">Brasil</div></div>`;
      }).catch(e => console.log("Erro logo"));
  }

  function exibir() {
    const mural = document.getElementById('mural');
    const item = conteudos[currentIndex];
    
    let proximoIndex = (currentIndex + 1) % conteudos.length;
    
    if (item.tipo === "IMAGEM") {
      mural.innerHTML = `<img src="${item.link}" class="slide-img">`;
      currentIndex = proximoIndex;
      setTimeout(exibir, item.duracao || 15000);
      
    } else if (item.tipo === "VÍDEO") {
      mural.innerHTML = `<video src="${item.link}" class="slide-img" autoplay muted playsinline id="video-ativo"></video>`;
      const vid = document.getElementById('video-ativo');
      
      vid.onended = () => {
        currentIndex = proximoIndex;
        exibir();
      };
      
      vid.onerror = () => {
        currentIndex = proximoIndex;
        exibir();
      };
      
    } else {
      mural.innerHTML = `<div class="texto-aviso">${item.link}</div>`;
      currentIndex = proximoIndex;
      setTimeout(exibir, item.duracao || 15000);
    }
  }

  function iniciarSistemaOriginal() {
    atualizarRelogio();
    carregarDados();
    setInterval(carregarDados, 30000);
  }
</script>
</body>
</html>
